name: The Economist (Playwright)

on:
  workflow_dispatch:
    inputs:
      issue_date:
        description: 'Issue Date (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run Economist Scraper
        id: scrape
        run: |
          python scrape_economist.py ${{ github.event.inputs.issue_date }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: economist-playwright-${{ github.event.inputs.issue_date || 'latest' }}
          path: |
            *.html
            *.txt
            *.epub
